<!-- ================= background.svg ================= -->
<!-- Guardar como archivo separado: background.svg -->
<svg width="100%" height="100%" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c7be5" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#6c757d" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Curvas tipo curvas de nivel -->
  <path d="M0 300 Q 200 200 400 300 T 800 300" stroke="url(#grad)" fill="none" stroke-width="2"/>
  <path d="M0 350 Q 200 250 400 350 T 800 350" stroke="url(#grad)" fill="none" stroke-width="2"/>
  <path d="M0 400 Q 200 300 400 400 T 800 400" stroke="url(#grad)" fill="none" stroke-width="2"/>
  <path d="M0 450 Q 200 350 400 450 T 800 450" stroke="url(#grad)" fill="none" stroke-width="2"/>

  <!-- Líneas de conectividad -->
  <circle cx="200" cy="200" r="4" fill="#2c7be5" />
  <circle cx="400" cy="150" r="4" fill="#2c7be5" />
  <circle cx="600" cy="250" r="4" fill="#2c7be5" />

  <line x1="200" y1="200" x2="400" y2="150" stroke="#2c7be5" stroke-opacity="0.3" />
  <line x1="400" y1="150" x2="600" y2="250" stroke="#2c7be5" stroke-opacity="0.3" />
</svg>